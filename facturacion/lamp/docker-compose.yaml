services:
  # Servicio Apache con PHP
  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: lamp_apache
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - mysql
    networks:
      - lamp_network
    restart: unless-stopped

  # Servicio MySQL
  mysql:
    image: mysql:8.0
    container_name: lamp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lamp_db
      MYSQL_USER: lamp_user
      MYSQL_PASSWORD: lamp_pass
    volumes:
      - ./mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - lamp_network
    restart: unless-stopped

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lamp_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: lamp_user
      PMA_PASSWORD: lamp_pass
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - lamp_network
    restart: unless-stopped

networks:
  lamp_network:
    driver: bridge
